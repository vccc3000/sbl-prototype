<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>港股 SBL 借券交易平台高保真原型</title>
  <style>
    :root {
      --bg:#f3f6fb;
      --panel:#fff;
      --line:#dfe6ef;
      --line2:#eef2f7;
      --text:#172033;
      --muted:#6b778c;
      --blue:#1f5eff;
      --blue2:#123e68;
      --green:#16a34a;
      --orange:#f59e0b;
      --red:#dc2626;
      --purple:#7c3aed;
      --softBlue:#edf4ff;
      --softGreen:#ecfdf5;
      --softOrange:#fff7ed;
      --softRed:#fef2f2;
      --softPurple:#f5f3ff;
      --shadow:0 14px 34px rgba(18,38,63,.08);
      --radius:14px;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      font-size:14px;
    }

    button,input,select,textarea { font-family:inherit; }

    .app {
      min-height:100vh;
      display:grid;
      grid-template-columns:248px 1fr;
    }

    .sidebar {
      background:#16263b;
      color:#cbd5e1;
      padding:18px 14px;
      height:100vh;
      overflow:auto;
      position:sticky;
      top:0;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:12px;
      padding:0 6px 18px;
      margin-bottom:14px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .logo {
      width:42px;
      height:42px;
      border-radius:12px;
      background:linear-gradient(135deg,#1f5eff,#22c1dc);
      color:#fff;
      display:grid;
      place-items:center;
      font-size:20px;
      font-weight:900;
      box-shadow:0 12px 24px rgba(31,94,255,.25);
    }

    .brand-title {
      color:#fff;
      font-weight:900;
      font-size:17px;
      line-height:1.1;
    }

    .brand-sub {
      margin-top:4px;
      font-size:12px;
      color:#91a3b8;
    }

    .role-list {
      display:grid;
      gap:8px;
      margin-bottom:16px;
    }

    .role-btn {
      width:100%;
      height:42px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      color:#d6dee9;
      border-radius:12px;
      cursor:pointer;
      text-align:left;
      padding:0 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-weight:800;
    }

    .role-btn.active,
    .role-btn:hover {
      background:rgba(31,94,255,.28);
      color:#fff;
      border-color:rgba(96,165,250,.45);
    }

    .nav-title {
      font-size:12px;
      color:#8090a4;
      padding:10px 8px 8px;
      letter-spacing:.5px;
    }

    .nav-item {
      padding:11px 12px;
      border-radius:11px;
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      margin-bottom:4px;
      user-select:none;
      transition:.16s;
    }

    .nav-item:hover {
      background:rgba(255,255,255,.06);
      color:#fff;
    }

    .nav-item.active {
      background:#0f3b68;
      color:#fff;
      box-shadow:inset 3px 0 0 #37bdf8;
    }

    .main { min-width:0; }

    .top-strip {
      height:38px;
      background:#647386;
      color:#e9eef5;
      display:flex;
      align-items:center;
      gap:28px;
      padding:0 24px;
      font-size:13px;
      font-weight:800;
    }

    .top-strip span.active {
      background:#123e68;
      margin-left:-12px;
      padding:11px 18px;
      align-self:stretch;
      display:flex;
      align-items:center;
    }

    .topbar {
      height:76px;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:0 26px;
      position:sticky;
      top:0;
      z-index:10;
    }

    .page-title {
      font-size:23px;
      font-weight:900;
    }

    .page-desc {
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
    }

    .top-actions {
      display:flex;
      align-items:center;
      gap:12px;
    }

    .search {
      position:relative;
    }

    .search:before {
      content:"⌕";
      position:absolute;
      left:14px;
      top:8px;
      color:#8a98aa;
    }

    .search input {
      width:280px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 14px 0 36px;
      outline:none;
    }

    .avatar {
      width:38px;
      height:38px;
      border-radius:50%;
      background:linear-gradient(135deg,#1f5eff,#15b8d8);
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:900;
    }

    .content {
      padding:22px 26px 42px;
    }

    .grid {
      display:grid;
      gap:16px;
    }

    .grid-4 { grid-template-columns:repeat(4,minmax(0,1fr)); }
    .grid-3 { grid-template-columns:repeat(3,minmax(0,1fr)); }
    .grid-2 { grid-template-columns:repeat(2,minmax(0,1fr)); }

    .card {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:0 10px 26px rgba(18,38,63,.04);
      overflow:hidden;
    }

    .card-head {
      padding:16px 18px;
      border-bottom:1px solid var(--line2);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .card-title {
      font-size:16px;
      font-weight:900;
    }

    .card-sub {
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
    }

    .card-body { padding:18px; }

    .metric {
      padding:18px;
      min-height:118px;
      position:relative;
    }

    .metric:after {
      content:"";
      position:absolute;
      right:-30px;
      top:-30px;
      width:86px;
      height:86px;
      border-radius:50%;
      background:var(--softBlue);
    }

    .metric-label {
      color:var(--muted);
      margin-bottom:8px;
    }

    .metric-value {
      font-weight:900;
      font-size:27px;
      letter-spacing:-.5px;
    }

    .metric-note {
      margin-top:10px;
      display:inline-flex;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      background:var(--softBlue);
      color:var(--blue);
    }

    .note-green { background:var(--softGreen); color:var(--green); }
    .note-orange { background:var(--softOrange); color:#b45309; }
    .note-red { background:var(--softRed); color:var(--red); }
    .note-purple { background:var(--softPurple); color:var(--purple); }

    .btn {
      height:36px;
      border-radius:9px;
      border:1px solid transparent;
      background:#fff;
      padding:0 13px;
      font-weight:800;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      white-space:nowrap;
    }

    .btn-primary {
      background:#123e68;
      color:#fff;
      box-shadow:0 8px 18px rgba(18,62,104,.2);
    }

    .btn-blue { background:var(--blue); color:#fff; }
    .btn-outline { border-color:var(--line); color:#334155; background:#fff; }
    .btn-soft { background:var(--softBlue); color:var(--blue); }

    .tag {
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .tag-blue { background:var(--softBlue); color:var(--blue); }
    .tag-green { background:var(--softGreen); color:var(--green); }
    .tag-orange { background:var(--softOrange); color:#b45309; }
    .tag-red { background:var(--softRed); color:var(--red); }
    .tag-purple { background:var(--softPurple); color:var(--purple); }
    .tag-gray { background:#eef2f7; color:#526173; }

    .toolbar {
      margin:16px 0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .filters {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .field,.select {
      height:36px;
      min-width:148px;
      border:1px solid var(--line);
      border-radius:9px;
      padding:0 10px;
      background:#fff;
      outline:none;
    }

    .table-wrap { overflow-x:auto; }

    table {
      width:100%;
      min-width:1120px;
      border-collapse:collapse;
    }

    th {
      background:#f8fafc;
      color:#56657a;
      text-align:left;
      font-size:12px;
      padding:11px 12px;
      border-bottom:1px solid var(--line);
      white-space:nowrap;
      font-weight:900;
    }

    td {
      padding:12px;
      border-bottom:1px solid var(--line2);
      white-space:nowrap;
      vertical-align:middle;
    }

    tr:hover td { background:#fbfdff; }

    .stock {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .stock-logo {
      width:32px;
      height:32px;
      border-radius:9px;
      background:var(--softBlue);
      color:var(--blue);
      display:grid;
      place-items:center;
      font-weight:900;
    }

    .stock-name { font-weight:900; }
    .stock-code { margin-top:2px; font-size:12px; color:var(--muted); }

    .progress {
      width:110px;
      height:8px;
      background:#e5eaf2;
      border-radius:999px;
      overflow:hidden;
    }

    .progress i {
      display:block;
      height:100%;
      background:linear-gradient(90deg,#1f5eff,#22c1dc);
      border-radius:inherit;
    }

    .upload-box {
      border:1.5px dashed #8bb9ff;
      background:linear-gradient(180deg,#edf4ff,#fff);
      border-radius:16px;
      padding:30px;
      text-align:center;
    }

    .upload-icon {
      width:58px;
      height:58px;
      border-radius:18px;
      background:var(--blue);
      color:#fff;
      font-size:26px;
      display:grid;
      place-items:center;
      margin:0 auto 14px;
    }

    .step {
      display:flex;
      gap:12px;
      padding:13px;
      border:1px solid var(--line);
      border-radius:13px;
      background:#f8fafc;
      margin-bottom:10px;
    }

    .step-num {
      width:30px;
      height:30px;
      border-radius:9px;
      background:var(--blue);
      color:#fff;
      font-weight:900;
      display:grid;
      place-items:center;
      flex:0 0 auto;
    }

    .step-title { font-weight:900; margin-bottom:3px; }
    .step-desc { color:var(--muted); font-size:12px; }

    .form-row {
      display:grid;
      grid-template-columns:118px 1fr;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    .form-row label {
      color:#415066;
      font-weight:900;
    }

    .form-row input,
    .form-row select,
    .form-row textarea {
      width:100%;
      border:1px solid var(--line);
      border-radius:9px;
      padding:9px 10px;
      outline:none;
      background:#fff;
    }

    .link-btn {
      border:0;
      background:transparent;
      color:#1f5eff;
      text-decoration:underline;
      font-weight:900;
      cursor:pointer;
      padding:0;
    }

    /* 港股撮合录入 */
    .trade-shell {
      display:grid;
      gap:16px;
    }

    .legacy-tabs {
      display:flex;
      background:#657386;
      height:36px;
      align-items:stretch;
      color:#edf2f7;
      font-size:13px;
      font-weight:900;
      border-radius:10px 10px 0 0;
      overflow:hidden;
    }

    .legacy-tabs span {
      padding:0 18px;
      display:flex;
      align-items:center;
    }

    .legacy-tabs span.active { background:#123e68; }

    .trade-alert {
      padding:13px 15px;
      border:1px solid #fde68a;
      background:#fffbeb;
      color:#92400e;
      border-radius:13px;
      line-height:1.6;
    }

    .trade-alert strong { color:#78350f; }

    .trade-panel {
      background:#fff;
      border:1px solid var(--line);
      border-radius:0 0 14px 14px;
      box-shadow:0 10px 26px rgba(18,38,63,.04);
      overflow:hidden;
    }

    .trade-panel.plain { border-radius:14px; }

    .trade-panel-head {
      min-height:46px;
      background:#f8fafc;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 14px;
    }

    .trade-panel-title {
      font-weight:900;
      color:#334155;
    }

    .hk-section-tip {
      padding:12px 14px;
      border-radius:12px;
      background:#f0f9ff;
      border:1px solid #bae6fd;
      color:#075985;
      line-height:1.6;
    }

    .hk-section-tip strong { color:#0c4a6e; }

    .hk-market-badge {
      display:inline-flex;
      align-items:center;
      height:24px;
      padding:0 8px;
      border-radius:999px;
      background:#ecfdf5;
      color:#16a34a;
      font-size:12px;
      font-weight:900;
    }

    .hk-trade-entry-grid {
      padding:14px;
      display:grid;
      grid-template-columns:
        92px 54px 100px 210px 86px 105px 150px 138px 120px 110px
        116px 112px 128px 100px 100px 126px 126px 130px 126px 150px;
      gap:7px;
      align-items:start;
      overflow-x:auto;
    }

    .trade-h {
      color:#1f5eff;
      font-size:12px;
      font-weight:900;
      padding:0 3px;
      white-space:nowrap;
    }

    .trade-cell { min-width:0; }

    .trade-input {
      width:100%;
      height:36px;
      border:1px solid var(--line);
      border-radius:7px;
      background:#fff;
      padding:0 8px;
      outline:none;
      font-size:13px;
    }

    .trade-input:focus {
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(31,94,255,.1);
    }

    .trade-input.readonly {
      background:#f8fafc;
      color:#334155;
      font-weight:800;
    }

    .trade-side {
      width:100%;
      height:36px;
      border-radius:7px;
      display:grid;
      place-items:center;
      background:#edf4ff;
      color:#1f5eff;
      font-weight:900;
    }

    .trade-check {
      height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .trade-note {
      margin-top:3px;
      color:#b45309;
      font-size:11px;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .hk-trade-summary {
      display:grid;
      grid-template-columns:repeat(7,minmax(120px,1fr));
      gap:12px;
      padding:0 14px 14px;
    }

    .trade-summary-item {
      border:1px solid var(--line);
      background:#f8fafc;
      border-radius:12px;
      padding:11px;
    }

    .trade-summary-label {
      font-size:12px;
      color:var(--muted);
      margin-bottom:5px;
    }

    .trade-summary-value {
      font-size:18px;
      font-weight:900;
    }

    .trade-submit {
      display:flex;
      justify-content:flex-end;
      gap:10px;
      padding:0 14px 14px;
    }

    .bulk-actions {
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
    }

    .modal-mask {
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.5);
      z-index:80;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .modal-mask.show { display:flex; }

    .modal {
      width:720px;
      max-width:100%;
      border-radius:18px;
      background:#fff;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .modal-head,
    .modal-foot {
      padding:16px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .modal-head { border-bottom:1px solid var(--line); }
    .modal-foot {
      border-top:1px solid var(--line);
      background:#f8fafc;
      justify-content:flex-end;
    }

    .modal-title {
      font-size:18px;
      font-weight:900;
    }

    .modal-body { padding:20px; }

    .toast {
      position:fixed;
      right:24px;
      top:94px;
      background:#111827;
      color:#fff;
      padding:12px 15px;
      border-radius:11px;
      box-shadow:var(--shadow);
      z-index:100;
      display:none;
      max-width:480px;
    }

    .toast.show { display:block; }

    @media (max-width:1180px) {
      .grid-4 { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .grid-3,.grid-2 { grid-template-columns:1fr; }
      .hk-trade-summary { grid-template-columns:repeat(3,minmax(120px,1fr)); }
    }

    @media (max-width:860px) {
      .app { grid-template-columns:1fr; }
      .sidebar { height:auto; position:relative; }
      .topbar {
        height:auto;
        padding:16px;
        align-items:flex-start;
        flex-direction:column;
      }
      .top-actions { width:100%; }
      .search,.search input { width:100%; }
      .content { padding:16px; }
      .grid-4 { grid-template-columns:1fr; }
      .hk-trade-summary { grid-template-columns:1fr; }
      .form-row { grid-template-columns:1fr; }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">S</div>
        <div>
          <div class="brand-title">港股 SBL 平台</div>
          <div class="brand-sub">Securities Borrowing & Lending</div>
        </div>
      </div>

      <div class="role-list">
        <button class="role-btn active" data-role="broker">券商端 <span>Broker</span></button>
        <button class="role-btn" data-role="trader">交易员端 <span>Trader</span></button>
        <button class="role-btn" data-role="admin">管理后台 <span>Admin</span></button>
      </div>

      <div class="nav-title" id="navTitle">券商端菜单</div>
      <div id="nav"></div>
    </aside>

    <main class="main">
      <div class="top-strip">
        <span>驾驶舱</span>
        <span class="active">交易管理</span>
        <span>运营处理</span>
        <span>基础资料</span>
        <span>券源管理</span>
        <span>风险控制</span>
      </div>

      <header class="topbar">
        <div>
          <div class="page-title" id="pageTitle">持仓上传</div>
          <div class="page-desc" id="pageDesc">上传客户持仓文件，系统校验后进入可借计算流程</div>
        </div>
        <div class="top-actions">
          <div class="search">
            <input placeholder="搜索证券代码 / ISIN / 交易编号 / 机构" />
          </div>
          <button class="btn btn-primary" onclick="openModal()">+ 快捷操作</button>
          <div class="avatar" id="avatar">BR</div>
        </div>
      </header>

      <section class="content" id="content"></section>
    </main>
  </div>

  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <div class="modal-head">
        <div>
          <div class="modal-title">快捷操作</div>
          <div class="card-sub">模拟借券交易录入、券源发布、风控审批等动作</div>
        </div>
        <button class="btn btn-outline" onclick="closeModal()">关闭</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>业务类型</label>
          <select>
            <option>创建港股借券交易</option>
            <option>发布券源</option>
            <option>上传持仓</option>
            <option>新增风控规则</option>
          </select>
        </div>
        <div class="form-row">
          <label>证券代码</label>
          <input value="00700.HK" />
        </div>
        <div class="form-row">
          <label>借券数量</label>
          <input value="100000" />
        </div>
        <div class="form-row">
          <label>备注</label>
          <textarea rows="3">港股 SBL 原型模拟操作。</textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="toast('操作已提交'); closeModal()">确认提交</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const roleMenus = {
      broker: {
        title: "券商端菜单",
        avatar: "BR",
        menus: [
          ["upload", "📤", "持仓上传", "上传客户持仓文件，系统校验后进入可借计算流程"],
          ["calc", "🧮", "可借计算结果", "按持仓、黑白名单、风控比例计算港股可借数量"],

          `;
        }

        const totalGross = lendableResults.reduce((s, r) => s + r.grossPosition, 0);
        const totalEligible = lendableResults.reduce((s, r) => s + r.eligibleInventory, 0);
        const totalLendable = lendableResults.reduce((s, r) => s + r.riskAdjustedLendable, 0);
        const totalFirm = lendableResults.reduce((s, r) => s + r.firmAvailable, 0);
        const totalUnauth = lendableResults.reduce((s, r) => s + r.breakdown.unauthorizedDeduction, 0);
        const avgRatio = totalGross > 0 ? (totalLendable / totalGross * 100).toFixed(1) : "0";
        const riskRestricted = lendableResults.filter(r => r.riskLevel === "restricted").length;
        const riskWarning = lendableResults.filter(r => r.riskLevel === "warning").length;

        const rows = lendableResults.map(r => {
          const ratio = r.grossPosition > 0 ? (r.riskAdjustedLendable / r.grossPosition * 100).toFixed(1) : "0";
          const riskTag = r.riskLevel === "normal" ? tag("正常","green")
            : r.riskLevel === "warning" ? tag("预警","orange")
            : tag("受限","red");
          const shortableTag = r.isShortSellable !== false ? tag("可沽空","green") : tag("非沽空","red");
          const pct = r.grossPosition > 0 ? Math.min(100, r.riskAdjustedLendable / r.grossPosition * 100) : 0;
          const barColor = r.riskLevel === "normal" ? "#16a34a" : r.riskLevel === "warning" ? "#f59e0b" : "#dc2626";
          return [
            stock(r.stockName, r.stockCode),
            r.grossPosition.toLocaleString(),
            r.eligibleInventory.toLocaleString(),
            r.operationalAvailable.toLocaleString(),
            `<div style="display:flex;align-items:center;gap:8px;"><span style="font-weight:900;min-width:70px;">${r.riskAdjustedLendable.toLocaleString()}</span><div style="width:80px;height:7px;background:#e5eaf2;border-radius:99px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${barColor};border-radius:inherit;"></div></div><span style="font-size:12px;color:var(--muted);">${ratio}%</span></div>`,
            r.firmAvailable.toLocaleString(),
            (r.boardLot || "-").toLocaleString(),
            r.primaryBottleneck,
            riskTag,
            shortableTag,
            `<button class="btn btn-soft" onclick="showDetail('${r.stockCode}')">明细</button>`
          ];
        });

        return `
          ${metrics([
            ["风险调整可借总量", totalLendable.toLocaleString(), `可执行 ${totalFirm.toLocaleString()}`, "green"],
            ["总持仓 / 有效库存", `${totalGross.toLocaleString()} / ${totalEligible.toLocaleString()}`, `未授权剔除 ${totalUnauth.toLocaleString()}`, "purple"],

    function renderRole(role) {
      currentRole = role;
      const cfg = roleMenus[role];

      navTitle.textContent = cfg.title;
      avatar.textContent = cfg.avatar;

      document.querySelectorAll(".role-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.role === role);
      });

      nav.innerHTML = cfg.menus.map((m,i) => `
        <div class="nav-item ${i === 0 ? "active" : ""}" data-page="${m[0]}">
          <span>${m[1]}</span>
          <span>${m[2]}</span>
        </div>
      `).join("");

      document.querySelectorAll(".nav-item").forEach(item => {
        item.addEventListener("click", () => {
          document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
          item.classList.add("active");
          renderPage(item.dataset.page);
        });
      });

      renderPage(cfg.menus[0][0]);
    }

    function renderPage(page) {
      const menu = roleMenus[currentRole].menus.find(m => m[0] === page);
      pageTitle.textContent = menu[2];

    function calcSingleTrade() {
      const bQty = num("bQty");
      const lQty = num("lQty");
      const bPrice = num("bRefPrice");
      const lPrice = num("lRefPrice");

      const bValue = bQty * bPrice;
      const lValue = lQty * lPrice;

      const bValueEl = document.getElementById("bMarketValue");
      const lValueEl = document.getElementById("lMarketValue");

      if (bValueEl) bValueEl.value = formatMoney(bValue);
      if (lValueEl) lValueEl.value = formatMoney(lValue);

      const nonMatch = document.getElementById("nonMatch")?.checked;

      const stockOk =
        val("bStockCode") === val("lStockCode") &&
        val("bIsin") === val("lIsin") &&
        val("bCcassCode") === val("lCcassCode");

      setText("stockMatch", stockOk ? "匹配" : (nonMatch ? "人工复核" : "不匹配"), stockOk || nonMatch);

      const qtyOk = bQty === lQty;
      setText("qtyMatch", qtyOk ? "匹配" : (nonMatch ? "人工复核" : "不匹配"), qtyOk || nonMatch);

      const spread = num("bRate") - num("lRate");
      setText("rateSpread", spread.toFixed(2) + "%", spread >= 0);

      const collateralOk =
        val("bCollateralCcy") === val("lCollateralCcy") &&
        num("bCollateralRatio") === num("lCollateralRatio");

      setText("collateralMatch", collateralOk ? "匹配" : (nonMatch ? "人工复核" : "不匹配"), collateralOk || nonMatch);

      const settleOk =
        val("bSettleDate") &&
        val("lSettleDate") &&
        val("bSettleDate") === val("lSettleDate");

      setText("settleMatch", settleOk ? "匹配" : (nonMatch ? "人工复核" : "待录入"), settleOk || nonMatch);

      const collateralBase = Math.max(bValue, lValue);
      const ratio = Math.max(num("bCollateralRatio"), num("lCollateralRatio")) || 105;
      const requiredCollateral = collateralBase * ratio / 100;

      const requiredEl = document.getElementById("requiredCollateral");
      if (requiredEl) requiredEl.value = "HKD " + formatMoney(requiredCollateral);

      const summaryCollateral = document.getElementById("summaryCollateral");
      if (summaryCollateral) {
        summaryCollateral.textContent = "HKD " + (requiredCollateral / 1000000).toFixed(2) + "M";
      }

      const status = document.getElementById("tradeStatus");
      if (status) {
        const allOk = stockOk && qtyOk && collateralOk && spread >= 0 && settleOk;
        status.textContent = allOk ? "预撮合通过" : (nonMatch ? "人工复核" : "待校验");
        status.style.color = allOk ? "#16a34a" : (nonMatch ? "#b45309" : "#dc2626");
      }
    }

    function validateSingleTrade() {
      calcSingleTrade();

      const nonMatch = document.getElementById("nonMatch")?.checked;

      if (!nonMatch && (
        val("bStockCode") !== val("lStockCode") ||
        val("bIsin") !== val("lIsin") ||
        val("bCcassCode") !== val("lCcassCode")
      )) {
        toast("校验失败：证券代码、ISIN 或 CCASS 股份编号不一致。");
        return false;
      }

      if (!nonMatch && num("bQty") !== num("lQty")) {
        toast("校验失败：借入方与借出方借券数量不一致。");
        return false;
      }

      if (num("bRate") < num("lRate")) {
        toast("校验失败：借入费率低于借出费率，交易利差为负。");
        return false;
      }

      if (!nonMatch && (
        val("bCollateralCcy") !== val("lCollateralCcy") ||
        num("bCollateralRatio") !== num("lCollateralRatio")
      )) {
        toast("校验失败：押品币种或押品比例不一致。");
        return false;
      }

      if (!nonMatch && (
        !val("bSettleDate") ||
        !val("lSettleDate") ||
        val("bSettleDate") !== val("lSettleDate")
      )) {
        toast("校验失败：预计交收日缺失或双边不一致。");
        return false;
      }

      toast(nonMatch ? "已进入人工复核流程。" : "校验通过：港股借券交易可提交。");
      return true;
    }

    function submitSingleTrade() {
      const ok = validateSingleTrade();
      if (!ok) return;

      const contractId = "HK-SBL-" + new Date().getTime().toString().slice(-8);

      const contractEl = document.getElementById("contractId");
      if (contractEl) contractEl.value = contractId;

      const lSi = document.getElementById("lCcassInstruction");

      if (bSi) bSi.value = ccassInstruction + "-B";
      if (lSi) lSi.value = ccassInstruction + "-L";

      const status = document.getElementById("tradeStatus");
      if (status) {
        status.textContent = "已提交";
        status.style.color = "#16a34a";
      }

      toast("港股借券交易已提交，合约编号：" + contractId);
    }

    // CSV 列名映射
    const CSV_COLUMNS = {
      stockCode: ["stock_code", "stockcode", "code", "证券代码", "stockCode"],
      stockName: ["stock_name", "stockname", "name", "证券名称", "stockName"],
      quantity: ["quantity", "qty", "持仓数量", "数量", "股数", "持仓"],
      clientId: ["client_id", "clientid", "client", "客户标识", "客户", "账户", "clientId"],
      authorized: ["authorized", "auth", "授权借出", "是否授权"],
      positionType: ["position_type", "positiontype", "type", "账户类型", "positionType"]
    };

    // 解析 CSV 文本
    function parseCsv(text) {
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) return { positions: [], errors: ["文件内容不足，至少需要表头和一行数据"] };

      const errors = [];
      // 解析表头
      const headers = parseCsvLine(lines[0]);
      const colMap = {};
      headers.forEach((h, i) => {
        const trimmed = h.trim().replace(/"/g, "");
        for (const [key, aliases] of Object.entries(CSV_COLUMNS)) {
          if (aliases.some(a => trimmed.toLowerCase() === a.toLowerCase())) {
            colMap[key] = i;
            break;
          }
        }
      });

      if (colMap.stockCode === undefined) errors.push("未找到「证券代码」列，请检查表头");
      if (colMap.quantity === undefined) errors.push("未找到「持仓数量」列，请检查表头");

      const positions = [];
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCsvLine(lines[i]);
        const pos = {
          id: `P${String(i).padStart(5, "0")}`,
          stockCode: (vals[colMap.stockCode] || "").trim().replace(/"/g, ""),
          stockName: (vals[colMap.stockName] || "").trim().replace(/"/g, ""),
          quantity: parseInt(vals[colMap.quantity]) || 0,
          clientId: (vals[colMap.clientId] || "").trim().replace(/"/g, "") || "UNKNOWN",
          authorized: colMap.authorized !== undefined
            ? ["true","1","yes","是","授权"].includes((vals[colMap.authorized] || "").trim().toLowerCase())
            : true,
          positionType: (vals[colMap.positionType] || "cash").trim().replace(/"/g, ""),
          brokerCode: "BRK001"
        };
        if (!pos.stockCode) {
          errors.push(`第 ${i + 1} 行：证券代码为空`);
          continue;
        }
        if (pos.quantity <= 0) {
          errors.push(`第 ${i + 1} 行：持仓数量无效`);
          continue;
        }
        positions.push(pos);
      }
      return { positions, errors };
    }

    function parseCsvLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;
      for (const ch of line) {
        if (ch === '"') { inQuotes = !inQuotes; continue; }
        if (ch === "," && !inQuotes) { result.push(current); current = ""; continue; }
        current += ch;
      }
      result.push(current);
      return result;
    }

    // 单只股票可借计算
    function calculateLendable(positions, stockCode, stockName, brokerCode, platformTotal) {
      const authorized = positions.filter(p => p.authorized);
      const grossPosition = positions.reduce((s, p) => s + p.quantity, 0);

      // Step 0: 港交所沽空资格检查
      const { sellable: shortSellable } = isShortSellable(stockCode);
      if (!shortSellable) {
        return {
          stockCode, stockName, brokerCode,
          grossPosition, eligibleInventory: 0, operationalAvailable: 0, riskAdjustedLendable: 0, firmAvailable: 0,
          isShortSellable: false,
          breakdown: {
            unauthorizedDeduction: 0, onLoanDeduction: 0, pendingSellDeduction: 0, recallIssuedDeduction: 0, reservedDeduction: 0, corpActionLockDeduction: 0,
            clientConcentration: { mcs: 0, hhi: 0, nEff: 0, recallReserve: 0, limitApplied: 0, triggered: false },
            positionConcentration: { singleStockShare: 0, limitApplied: 0, triggered: false },
            marketStress: { stressFlag: "normal", discountFactor: 1.0, triggered: false },
            haircutInfo: { category: "other", fsbFloor: 0.10, requiredCollateralMultiplier: 1.11, note: "" }
          },
          primaryBottleneck: "非港交所指定可沽空证券", riskLevel: "restricted", constraints: [],
          calculatedAt: new Date().toISOString(), ruleVersion: RULES.ruleVersion
        };
      }

      // L1: eligible inventory
      const unauthorizedDeduction = positions.filter(p => !p.authorized).reduce((s, p) => s + p.quantity, 0);
      const eligibleInventory = grossPosition - unauthorizedDeduction;

      // L2: operational available（默认上传数据均可借，不扣减已借出）
      const pendingSellDeduction = 0;   // 上传数据默认无待卖出
      const recallIssuedDeduction = 0; // 上传数据默认无召回
      const reservedDeduction = 0;     // 上传数据默认无预留
      const corpActionLockDeduction = 0;
      const onLoanDeduction = 0;       // 上传数据默认均可借，不扣减已借出
      const operationalAvailable = eligibleInventory;  // 上传文件中数量均为可借

      if (operationalAvailable <= 0) {
        return makeZeroResult(stockCode, stockName, brokerCode, grossPosition, eligibleInventory, unauthorizedDeduction,
          onLoanDeduction, pendingSellDeduction, recallIssuedDeduction, reservedDeduction, corpActionLockDeduction);
      }

      // L3: 风险约束计算
      const constraints = [];

      // 客户集中度
      const clientAgg = {};
      authorized.forEach(p => {
        clientAgg[p.clientId] = (clientAgg[p.clientId] || 0) + p.quantity;
      });
      const sortedClients = Object.entries(clientAgg).sort((a, b) => b[1] - a[1]);
      const totalAuthQty = sortedClients.reduce((s, c) => s + c[1], 0);
      const mcs = sortedClients.length > 0 ? sortedClients[0][1] / totalAuthQty : 1;
      const hhi = sortedClients.reduce((s, c) => s + Math.pow(c[1] / totalAuthQty, 2), 0);
      const nEff = hhi > 0 ? Math.round(1 / hhi * 10) / 10 : 0;

      let recallReserve = 0;
      if (mcs >= RULES.clientConcentration.recallReserveTrigger) {
        recallReserve = Math.ceil(sortedClients[0][1] * RULES.clientConcentration.recallReservePct);
      }
      const clientCeiling = operationalAvailable - recallReserve;
      constraints.push({
        name: "客户集中度",
        value: clientCeiling,
        triggered: recallReserve > 0 || mcs >= RULES.clientConcentration.mcsLimit,
        detail: { mcs, hhi, nEff, recallReserve, topClient: sortedClients[0]?.[0] || "-" }
      });

      // 单券集中度
      const singleStockShare = platformTotal > 0 ? totalAuthQty / platformTotal : 0;
      const posCeiling = singleStockShare > RULES.positionConcentration.singleStockLimit
        ? Math.floor(totalAuthQty * RULES.positionConcentration.singleStockLimit / singleStockShare)
        : operationalAvailable;
      constraints.push({ name: "单券集中度", value: posCeiling, triggered: singleStockShare > RULES.positionConcentration.singleStockLimit, detail: { share: singleStockShare } });

      // 流动性（默认通过）
      const liqCeiling = Math.floor(operationalAvailable * RULES.liquidity.defaultFactor);
      constraints.push({ name: "流动性", value: liqCeiling, triggered: false, detail: { factor: RULES.liquidity.defaultFactor } });

      // 市场压力（默认 normal）
      const stressDiscount = RULES.marketStress.normal.discount;
      const stressCeiling = Math.floor(operationalAvailable * stressDiscount);
      constraints.push({ name: "市场压力", value: stressCeiling, triggered: false, detail: { level: "normal", discount: stressDiscount } });

      // 取最严约束
      const minConstraint = constraints.reduce((min, c) => c.value < min.value ? c : min, constraints[0]);
      const riskAdjustedLendable = minConstraint.value;

      // L3.5: 整手取整（向下取整到整手数）
      const boardLot = getBoardLot(stockCode) || 1;
      const riskAdjustedLendableInLots = boardLot > 0
        ? Math.floor(riskAdjustedLendable / boardLot) * boardLot
        : riskAdjustedLendable;

      // L4: firm available (conservative floor)
      const firmAvailable = Math.floor(riskAdjustedLendableInLots * 0.95);

      // 风险等级（基于取整后的可借量）
      const ratio = operationalAvailable > 0 ? riskAdjustedLendableInLots / operationalAvailable : 0;
      const riskLevel = ratio >= 0.7 ? "normal" : ratio >= 0.4 ? "warning" : "restricted";

      // 主要瓶颈
      const bottlenecks = constraints.filter(c => c.triggered).map(c => c.name);
      const primaryBottleneck = bottlenecks.length > 0 ? bottlenecks.join("、") : "无显著约束";

      return {
        stockCode, stockName, brokerCode,
        grossPosition, eligibleInventory, operationalAvailable,
        riskAdjustedLendable: riskAdjustedLendableInLots,  // 整手取整后
        firmAvailable,
        breakdown: {
          unauthorizedDeduction, onLoanDeduction, pendingSellDeduction, recallIssuedDeduction, reservedDeduction, corpActionLockDeduction,
          clientConcentration: { mcs, hhi, nEff, recallReserve, limitApplied: clientCeiling, triggered: recallReserve > 0 || mcs >= RULES.clientConcentration.mcsLimit },
          positionConcentration: { singleStockShare, limitApplied: posCeiling, triggered: singleStockShare > RULES.positionConcentration.singleStockLimit },
          marketStress: { stressFlag: "normal", discountFactor: stressDiscount, triggered: false },
          haircutInfo: { category: "other", fsbFloor: RULES.haircut.other, requiredCollateralMultiplier: 1 / (1 - RULES.haircut.other), note: "FSB 最低 haircut 10%（非主要指数成分股）" }
        },
        primaryBottleneck, riskLevel, constraints,
        isShortSellable: true,
        boardLot,
        calculatedAt: new Date().toISOString(),
        ruleVersion: RULES.ruleVersion
      };
    }

    function makeZeroResult(code, name, broker, gross, eligible, unauth, onLoan, pendingSell, recall, reserved, corpLock) {
      return {
        stockCode: code, stockName: name, brokerCode: broker,
        grossPosition: gross, eligibleInventory: eligible, operationalAvailable: 0, riskAdjustedLendable: 0, firmAvailable: 0,
        breakdown: { unauthorizedDeduction: unauth, onLoanDeduction: onLoan, pendingSellDeduction: pendingSell, recallIssuedDeduction: recall, reservedDeduction: reserved, corpActionLockDeduction: corpLock,
          clientConcentration: { mcs: 0, hhi: 0, nEff: 0, recallReserve: 0, limitApplied: 0, triggered: false },
          positionConcentration: { singleStockShare: 0, limitApplied: 0, triggered: false },
          marketStress: { stressFlag: "normal", discountFactor: 1.0, triggered: false },
          haircutInfo: { category: "other", fsbFloor: 0.10, requiredCollateralMultiplier: 1.11, note: "" }
        },
        primaryBottleneck: "授权持仓不足或全部已占用", riskLevel: "restricted", constraints: [],
        calculatedAt: new Date().toISOString(), ruleVersion: RULES.ruleVersion
      };
    }

    // 批量计算
    function calculateAllLendable(positions) {
      const grouped = {};
      positions.forEach(p => {
        const key = p.stockCode;
        if (!grouped[key]) grouped[key] = { positions: [], name: p.stockName, broker: p.brokerCode };
        grouped[key].positions.push(p);
        if (p.stockName) grouped[key].name = p.stockName;
      });
      const totalPlatform = Object.values(grouped).reduce((s, g) => s + g.positions.reduce((s2, p) => s2 + p.quantity, 0), 0);
      return Object.entries(grouped).map(([code, g]) =>
        calculateLendable(g.positions, code, g.name, g.broker, totalPlatform)
      );
    }

    // 处理文件上传
    function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        const text = evt.target.result;
        const { positions, errors } = parseCsv(text);
        if (positions.length === 0) {
          toast("解析失败：" + (errors[0] || "无有效数据"));
          return;
        }
        uploadedPositions = positions;
        lendableResults = calculateAllLendable(positions);
        toast(`解析成功：${positions.length} 行持仓，${lendableResults.length} 只证券`);
        // 自动跳转到计算结果
        document.querySelectorAll(".nav-item").forEach(item => {
          if (item.dataset.page === "calc") item.click();
        });
      };
      reader.readAsText(file);
    }

                <div><span style="color:var(--muted);display:inline-block;width:120px;">L0 总持仓</span>${pctBar(r.grossPosition, "#1f5eff")}</div>
                <div><span style="color:var(--muted);display:inline-block;width:120px;">L1 有效库存</span>${pctBar(r.eligibleInventory, "#22c1dc")}
                  ${r.isShortSellable === false ? '<span style="font-size:11px;color:var(--red);margin-left:8px;">🚫 非港交所指定可沽空证券</span>' : '<span style="font-size:11px;color:var(--green);margin-left:8px;">✓ 港交所指定可沽空</span><span style="font-size:11px;color:var(--muted);margin-left:8px;"></span>'}
                  <span style="font-size:11px;color:var(--red);margin-left:8px;">- 未授权 ${b.unauthorizedDeduction.toLocaleString()}</span></div>
                <div><span style="color:var(--muted);display:inline-block;width:120px;">L2 操作可用</span>${pctBar(r.operationalAvailable, "#7c3aed")}
                  <span style="font-size:11px;color:var(--green);margin-left:8px;">上传数据默认全部可借</span></div>
                <div><span style="color:var(--muted);display:inline-block;width:120px;">L3 风险调整</span>${pctBar(r.riskAdjustedLendable, "#16a34a")}
                  ${r.boardLot > 1 ? `<span style="font-size:11px;color:var(--blue);margin-left:8px;">← 整手取整(每手${r.boardLot.toLocaleString()}股)</span>` : ''}</div>
                <div><span style="color:var(--muted);display:inline-block;width:120px;">L4 可执行</span>${pctBar(r.firmAvailable, "#f59e0b")}
                  <span style="font-size:11px;color:var(--muted);margin-left:8px;">× 0.95 保守系数</span></div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
              <div style="border:1px solid var(--line);border-radius:12px;padding:14px;">
                <div style="font-weight:900;margin-bottom:10px;">👥 客户分散度</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;">
                  <div><span style="color:var(--muted);">MCS 最大客户占比</span><div style="font-weight:900;font-size:16px;">${(b.clientConcentration.mcs * 100).toFixed(1)}%</div></div>
                  <div><span style="color:var(--muted);">HHI 赫芬达尔指数</span><div style="font-weight:900;font-size:16px;">${(b.clientConcentration.hhi * 10000).toFixed(0)}</div></div>
                  <div><span style="color:var(--muted);">有效客户数 N_eff</span><div style="font-weight:900;font-size:16px;">${b.clientConcentration.nEff}</div></div>
                  <div><span style="color:var(--muted);">召回储备量</span><div style="font-weight:900;font-size:16px;color:${b.clientConcentration.recallReserve > 0 ? 'var(--orange)' : 'var(--green)'};">${b.clientConcentration.recallReserve.toLocaleString()}</div></div>
                </div>
                ${b.clientConcentration.triggered ? `<div style="margin-top:8px;padding:6px 10px;background:var(--softOrange);border-radius:8px;font-size:12px;color:#b45309;">⚠ 已触发约束</div>` : `<div style="margin-top:8px;padding:6px 10px;background:var(--softGreen);border-radius:8px;font-size:12px;color:var(--green);">✓ 未触发</div>`}
              </div>
              <div style="border:1px solid var(--line);border-radius:12px;padding:14px;">
                <div style="font-weight:900;margin-bottom:10px;">📐 集中度与市场</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;">
                  <div><span style="color:var(--muted);">单券占平台比</span><div style="font-weight:900;font-size:16px;">${(b.positionConcentration.singleStockShare * 100).toFixed(2)}%</div></div>
                  <div><span style="color:var(--muted);">市场压力等级</span><div style="font-weight:900;font-size:16px;">${b.marketStress.stressFlag.toUpperCase()}</div></div>
                  <div><span style="color:var(--muted);">压力折扣因子</span><div style="font-weight:900;font-size:16px;">${b.marketStress.discountFactor.toFixed(2)}</div></div>
                  <div><span style="color:var(--muted);">主要瓶颈</span><div style="font-weight:900;font-size:13px;color:${r.primaryBottleneck === "无显著约束" ? "var(--green)" : "var(--orange)"};">${r.primaryBottleneck}</div></div>
                </div>
              </div>
              <div style="border:1px solid var(--line);border-radius:12px;padding:14px;">
                <div style="font-weight:900;margin-bottom:10px;">🏦 FSB Haircut 参考</div>
                <div style="font-size:13px;">
                  <div><span style="color:var(--muted);">分类</span><div style="font-weight:900;">${b.haircutInfo.category === "main_index" ? "主要指数成分股" : "其他股票"}</div></div>
                  <div style="margin-top:6px;"><span style="color:var(--muted);">FSB 最低 haircut</span><div style="font-weight:900;font-size:18px;">${(b.haircutInfo.fsbFloor * 100).toFixed(0)}%</div></div>
                  <div style="margin-top:6px;"><span style="color:var(--muted);">抵押品乘数</span><div style="font-weight:900;">${b.haircutInfo.requiredCollateralMultiplier.toFixed(3)}x</div></div>
                  <div style="margin-top:8px;padding:6px 10px;background:#f0f4f8;border-radius:8px;font-size:11px;color:var(--muted);">${b.haircutInfo.note}</div>
                  <div style="margin-top:8px;padding:6px 10px;background:var(--softBlue);border-radius:8px;font-size:12px;color:var(--blue);"><strong>每手买卖单位：${r.boardLot ? r.boardLot.toLocaleString() : "N/A"} 股</strong> — 可借量已向下取整至整手数</div>
                </div>
              </div>
              <div style="border:1px solid var(--line);border-radius:12px;padding:14px;">
                <div style="font-weight:900;margin-bottom:10px;">📋 扣减明细</div>
                <div style="display:grid;gap:4px;font-size:13px;">
                  <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">未授权扣减</span><span style="font-weight:900;color:var(--red);">-${b.unauthorizedDeduction.toLocaleString()}</span></div>
                  <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">客户集中度约束</span><span style="font-weight:900;color:${b.clientConcentration.triggered ? 'var(--orange)' : 'var(--green)'};">${b.clientConcentration.triggered ? b.clientConcentration.limitApplied.toLocaleString() : '未触发'}</span></div>
                  <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">单券集中度约束</span><span style="font-weight:900;color:${b.positionConcentration.triggered ? 'var(--orange)' : 'var(--green)'};">${b.positionConcentration.triggered ? b.positionConcentration.limitApplied.toLocaleString() : '未触发'}</span></div>
                  <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">市场压力折扣</span><span style="font-weight:900;">×${b.marketStress.discountFactor.toFixed(2)}</span></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
      panel.scrollIntoView({ behavior: "smooth" });
    }

    // 下载示例 CSV
    function downloadSampleCsv() {
      const csv = generateSampleCsv();
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "sbl_holdings_sample.csv"; a.click();
      URL.revokeObjectURL(url);
      toast("示例 CSV 已下载");
    }

    renderRole("broker");
  </script>
</body>
</html>
