<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBL平台完整高保真原型</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel2: #f8fafc;
      --text: #111827;
      --muted: #64748b;
      --line: #e5e7eb;
      --line2: #eef2f7;
      --primary: #2563eb;
      --primary2: #1d4ed8;
      --primarySoft: #eff6ff;
      --success: #16a34a;
      --successSoft: #ecfdf5;
      --warning: #f59e0b;
      --warningSoft: #fffbeb;
      --danger: #dc2626;
      --dangerSoft: #fef2f2;
      --purple: #7c3aed;
      --purpleSoft: #f5f3ff;
      --side: #0f172a;
      --side2: #111827;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
    }

    button, input, select, textarea { font-family: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    .sidebar {
      height: 100vh;
      position: sticky;
      top: 0;
      background: linear-gradient(180deg, var(--side), var(--side2));
      color: #cbd5e1;
      padding: 20px 16px;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 0 6px 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      margin-bottom: 16px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      box-shadow: 0 12px 26px rgba(37, 99, 235, .32);
    }

    .brand-title {
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.2;
    }

    .brand-sub {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 3px;
    }

    .role-switch {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    .role-btn {
      width: 100%;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: #cbd5e1;
      border-radius: 14px;
      padding: 11px 12px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: .2s;
    }

    .role-btn.active,
    .role-btn:hover {
      color: #fff;
      background: rgba(37,99,235,.22);
      border-color: rgba(96,165,250,.4);
    }

    .nav-title {
      color: #64748b;
      font-size: 12px;
      padding: 12px 8px 8px;
      letter-spacing: .5px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 4px;
      user-select: none;
      transition: .2s;
    }

    .nav-item:hover {
      background: rgba(255,255,255,.06);
      color: #fff;
    }

    .nav-item.active {
      background: #1e293b;
      color: #fff;
      box-shadow: inset 3px 0 0 #38bdf8;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 76px;
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      gap: 16px;
    }

    .page-title {
      font-size: 23px;
      font-weight: 900;
      margin-bottom: 3px;
    }

    .page-desc {
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .global-search {
      position: relative;
    }

    .global-search span {
      position: absolute;
      left: 13px;
      top: 9px;
      color: #94a3b8;
    }

    .global-search input {
      width: 280px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 0 14px 0 36px;
      outline: none;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      color: #fff;
      font-weight: 900;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
    }

    .content {
      padding: 24px 28px 42px;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 28px rgba(15,23,42,.04);
      overflow: hidden;
    }

    .card-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 900;
    }

    .card-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .card-body { padding: 20px; }

    .metric {
      padding: 20px;
      position: relative;
      overflow: hidden;
      min-height: 132px;
    }

    .metric:after {
      content: "";
      position: absolute;
      right: -28px;
      top: -28px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--primarySoft);
    }

    .metric-label {
      color: var(--muted);
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -.5px;
    }

    .metric-note {
      margin-top: 10px;
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: var(--primarySoft);
      color: var(--primary);
    }

    .note-green { background: var(--successSoft); color: var(--success); }
    .note-orange { background: var(--warningSoft); color: #b45309; }
    .note-red { background: var(--dangerSoft); color: var(--danger); }
    .note-purple { background: var(--purpleSoft); color: var(--purple); }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .field, .select {
      height: 38px;
      min-width: 150px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 11px;
      padding: 0 12px;
      outline: none;
    }

    .field:focus, .select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37,99,235,.1);
    }

    .btn {
      height: 38px;
      border-radius: 11px;
      padding: 0 14px;
      border: 1px solid transparent;
      background: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 800;
      transition: .18s;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 10px 18px rgba(37,99,235,.18);
    }

    .btn-outline {
      background: #fff;
      border-color: var(--line);
      color: #334155;
    }

    .btn-soft {
      background: var(--primarySoft);
      color: var(--primary);
    }

    .btn-danger {
      background: var(--dangerSoft);
      color: var(--danger);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .tag-blue { background: var(--primarySoft); color: var(--primary); }
    .tag-green { background: var(--successSoft); color: var(--success); }
    .tag-orange { background: var(--warningSoft); color: #b45309; }
    .tag-red { background: var(--dangerSoft); color: var(--danger); }
    .tag-purple { background: var(--purpleSoft); color: var(--purple); }
    .tag-gray { background: #f1f5f9; color: #475569; }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th {
      text-align: left;
      background: #f8fafc;
      color: #475569;
      font-size: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
      font-weight: 900;
    }

    td {
      padding: 14px;
      border-bottom: 1px solid var(--line2);
      white-space: nowrap;
      vertical-align: middle;
    }

    tr:hover td { background: #fbfdff; }

    .stock {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stock-logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: var(--primarySoft);
      color: var(--primary);
      font-weight: 900;
    }

    .stock-name { font-weight: 900; }
    .stock-code { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .progress {
      width: 116px;
      height: 8px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #38bdf8);
      border-radius: inherit;
    }

    .upload-box {
      border: 1.5px dashed #93c5fd;
      background: linear-gradient(180deg, #eff6ff, #ffffff);
      border-radius: 18px;
      padding: 32px;
      text-align: center;
    }

    .upload-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 26px;
      margin: 0 auto 14px;
      box-shadow: 0 12px 24px rgba(37,99,235,.24);
    }

    .upload-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .upload-desc {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .steps {
      display: grid;
      gap: 12px;
    }

    .step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid var(--line);
    }

    .step-num {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: #fff;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .step-title { font-weight: 900; margin-bottom: 3px; }
    .step-desc { color: var(--muted); font-size: 12px; }

    .mini-form {
      display: grid;
      gap: 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      align-items: center;
    }

    .form-row label {
      color: #475569;
      font-weight: 800;
    }

    .form-row input,
    .form-row select,
    .form-row textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 10px 12px;
      outline: none;
      background: #fff;
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .timeline-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .timeline-dot {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: var(--primarySoft);
      color: var(--primary);
      display: grid;
      place-items: center;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .tl-title { font-weight: 900; margin-bottom: 3px; }
    .tl-desc { color: var(--muted); font-size: 12px; }

    .kanban {
      display: grid;
      grid-template-columns: repeat(4, minmax(250px, 1fr));
      gap: 16px;
      overflow-x: auto;
    }

    .kanban-col {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      min-height: 430px;
    }

    .kanban-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .deal-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 8px 18px rgba(15,23,42,.04);
    }

    .deal-id {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .deal-name {
      font-weight: 900;
      font-size: 15px;
    }

    .deal-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .deal-meta strong {
      display: block;
      color: var(--text);
      font-size: 14px;
      margin-top: 2px;
    }

    .rule-card {
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 16px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .switch {
      width: 46px;
      height: 26px;
      border-radius: 999px;
      background: var(--primary);
      position: relative;
      flex: 0 0 auto;
    }

    .switch:after {
      content: "";
      position: absolute;
      right: 3px;
      top: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
    }

    .audit {
      display: grid;
      gap: 12px;
    }

    .audit-row {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      display: grid;
      grid-template-columns: 130px 1fr 160px;
      gap: 12px;
      align-items: center;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(15,23,42,.48);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-mask.show { display: flex; }

    .modal {
      width: 760px;
      max-width: 100%;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: pop .18s ease;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(.98); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-head,
    .modal-foot {
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-head { border-bottom: 1px solid var(--line); }
    .modal-foot { background: #f8fafc; justify-content: flex-end; }

    .modal-title {
      font-size: 18px;
      font-weight: 900;
    }

    .modal-body { padding: 22px; }

    .toast {
      position: fixed;
      top: 92px;
      right: 28px;
      z-index: 100;
      background: #111827;
      color: #fff;
      padding: 13px 16px;
      border-radius: 12px;
      display: none;
      box-shadow: var(--shadow);
    }

    .toast.show { display: block; }

    @media (max-width: 1180px) {
      .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-3, .grid-2 { grid-template-columns: 1fr; }
    }

    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { height: auto; position: relative; }
      .topbar {
        height: auto;
        padding: 18px;
        flex-direction: column;
        align-items: flex-start;
      }
      .top-actions { width: 100%; justify-content: space-between; }
      .global-search input { width: 100%; }
      .content { padding: 18px; }
      .grid-4 { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .audit-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">S</div>
        <div>
          <div class="brand-title">SBL Platform</div>
          <div class="brand-sub">完整高保真页面原型</div>
        </div>
      </div>

      <div class="role-switch">
        <button class="role-btn active" data-role="broker">券商端 <span>Broker</span></button>
        <button class="role-btn" data-role="trader">交易员端 <span>Trader</span></button>
        <button class="role-btn" data-role="admin">管理后台 <span>Admin</span></button>
      </div>

      <div class="nav-title" id="navTitle">券商端菜单</div>
      <div id="nav"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="page-title" id="pageTitle">持仓上传</div>
          <div class="page-desc" id="pageDesc">上传客户持仓文件，系统校验后进入可借计算流程</div>
        </div>
        <div class="top-actions">
          <div class="global-search">
            <span>⌕</span>
            <input placeholder="搜索股票 / 机构 / 交易编号 / 操作人" />
          </div>
          <button class="btn btn-primary" onclick="openModal()">+ 快捷操作</button>
          <div class="avatar" id="avatar">BR</div>
        </div>
      </header>

      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="modalTitle">快捷操作</div>
          <div class="card-sub">该弹窗用于模拟创建、发布、审批、锁券等业务操作</div>
        </div>
        <button class="btn btn-outline" onclick="closeModal()">关闭</button>
      </div>
      <div class="modal-body">
        <div class="mini-form">
          <div class="form-row">
            <label>业务类型</label>
            <select>
              <option>创建撮合单</option>
              <option>发布券源</option>
              <option>上传持仓</option>
              <option>新增风控规则</option>
            </select>
          </div>
          <div class="form-row">
            <label>股票代码</label>
            <input value="00700.HK" />
          </div>
          <div class="form-row">
            <label>数量</label>
            <input value="100000" />
          </div>
          <div class="form-row">
            <label>备注</label>
            <textarea rows="3">高保真原型模拟操作，无真实提交。</textarea>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="toast('操作已提交，状态已更新'); closeModal()">确认提交</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const roleMenus = {
      broker: {
        title: "券商端菜单",
        avatar: "BR",
        menus: [
          ["upload", "📤", "持仓上传", "上传客户持仓文件，系统校验后进入可借计算流程"],
          ["calc", "🧮", "可借计算结果", "查看系统根据持仓和风控规则计算出的可借数量"],
          ["publish", "🚀", "券源发布", "选择可借股票，设置数量、期限、费率后发布至券池"],
          ["mySource", "📦", "我的券源", "管理已发布、已借出、已撤回和风控冻结的券源"],
          ["brokerRevenue", "💰", "收益报表", "查看借出股票产生的券息收益和结算状态"]
        ]
      },
      trader: {
        title: "交易员端菜单",
        avatar: "TR",
        menus: [
          ["pool", "📊", "券池广场", "查看全平台已发布可借券源，支持筛选、锁券与撮合"],
          ["demand", "📝", "借券需求", "登记并管理场外收到的借券需求"],
          ["workspace", "🔁", "撮合工作台", "以看板方式跟进待撮合、已锁券、已确认和待交收需求"],
          ["lifecycle", "🔄", "交易生命周期", "查看交易从确认、交收、计息、归还到结束的完整状态"],
          ["settlement", "✅", "交收管理", "维护CCASS交收、归还、召回与异常交收状态"]
        ]
      },
      admin: {
        title: "管理后台菜单",

            ["高敏权限用户", "9", "含导出和风控配置", "red"]
          ])}
          ${tableCard("用户权限", "配置用户、角色、菜单权限、数据权限和操作权限",
            ["用户","所属机构","角色","数据权限","最近登录","状态","操作"],
            [
              ["broker_admin","华南证券","券商管理员","仅本机构","2026-01-15 09:42",tag("启用","green"),btns("授权")],
              ["trader_alex","平台交易部","交易员","全平台券源","2026-01-15 10:08",tag("启用","green"),btns("授权")],
              ["risk_jane","平台风控部","风控人员","全量风控数据","2026-01-15 08:55",tag("高敏权限","red"),btns("复核")],
              ["ops_mike","平台运营部","运营人员","机构与交易数据","2026-01-14 18:20",tag("启用","green"),btns("授权")]
            ])}
        `;
      },

      riskRule() {
        return `
          ${metrics([
            ["启用规则", "28", "覆盖事前/事中/事后", "green"],
            ["今日触发", "43", "高风险 6 条", "orange"],
            ["冻结券源", "12", "价格波动/公司行动", "red"],
            ["规则版本", "v2.6.1", "今日 09:00 生效", "blue"]
          ])}
          <div class="grid grid-2" style="margin-top:18px;">
            <div class="card">
              <div class="card-head"><div><div class="card-title">风控规则配置</div><div class="card-sub">支持比例、额度、集中度、公司行动和交收规则</div></div></div>
              <div class="card-body">
                <div class="grid">
                  ${rule("基础可借比例","默认最多可借出可用持仓的 80%，可按股票风险等级调整。","启用")}
                  ${rule("单票集中度限制","单只股票平台总出借数量不得超过总可借的 85%。","启用")}
                  ${rule("公司行动限制","除权、供股、合股、停牌窗口期自动暂停出借。","启用")}
                  ${rule("异常波动限制","近3日价格波动超过阈值，自动降低比例或冻结。","启用")}
                </div>
              </div>
            </div>
            ${tableCard("规则触发记录", "最近风控规则触发明细",
              ["时间","股票","规则","影响","处理状态"],
              [
                ["2026-01-15 10:18",stock("快手-W","01024.HK"),"异常波动限制","冻结新发布",tag("已生效","red")],
                ["2026-01-15 09:48",stock("腾讯控股","00700.HK"),"单票集中度","限制新增撮合",tag("预警","orange")],
                ["2026-01-15 09:12",stock("药明生物","02269.HK"),"流动性限制","可借比例降至40%",tag("已生效","blue")]
              ])}
          </div>
        `;
      },

      blackWhite() {
        return `
          ${metrics([
            ["黑名单股票", "36", "禁止发布和撮合", "red"],
            ["白名单股票", "168", "优先准入", "green"],
            ["限制名单", "24", "需风控审批", "orange"],
            ["今日变更", "7", "全部已审计留痕", "blue"]
          ])}
          ${tableCard("股票黑白名单", "管理股票准入、禁借、限制出借和特殊审批名单",
            ["股票","名单类型","限制原因","生效时间","失效时间","操作人","状态","操作"],
            [
              [stock("快手-W","01024.HK"),tag("黑名单","red"),"价格异常波动","2026-01-15","2026-01-22","risk_jane",tag("生效中","red"),btns("移除")],
              [stock("腾讯控股","00700.HK"),tag("白名单","green"),"高流动性核心标的","2026-01-01","长期","ops_mike",tag("生效中","green"),btns("编辑")],
              [stock("药明生物","02269.HK"),tag("限制名单","orange"),"低流动性，可借比例40%","2026-01-15","2026-01-18","risk_jane",tag("生效中","orange"),btns("调整")],
              [stock("小米集团-W","01810.HK"),tag("白名单","green"),"可正常出借","2026-01-01","长期","admin",tag("生效中","green"),btns("编辑")]
            ])}
        `;
      },

      audit() {
        return `
          ${metrics([
            ["今日操作日志", "1,842", "覆盖所有业务模块", "blue"],
            ["高敏操作", "28", "规则/额度/权限变更", "red"],
            ["导出行为", "16", "均已水印记录", "orange"],
            ["异常登录", "0", "安全状态正常", "green"]
          ])}
          <div class="card" style="margin-top:18px;">
            <div class="card-head">
              <div>
                <div class="card-title">审计日志</div>
                <div class="card-sub">记录用户登录、数据修改、审批、撮合、交收等全流程操作</div>
              </div>
              <button class="btn btn-outline" onclick="toast('审计日志已导出')">导出日志</button>
            </div>
            <div class="card-body">
              <div class="audit">
                ${auditRow("10:42:18","trader_alex 创建撮合单 MAT-20260115-018，股票 09988.HK，数量 80,000。","交易员端 / 撮合工作台")}
                ${auditRow("10:18:06","risk_jane 将 01024.HK 加入黑名单，原因：异常价格波动。","管理后台 / 黑白名单")}
                ${auditRow("09:55:44","broker_admin 发布 00700.HK 券源 500,000 股，参考费率 3.80%。","券商端 / 券源发布")}
                ${auditRow("09:21:30","ops_mike 调整 Alpha Fund 额度，从 HK$400M 调整至 HK$500M。","管理后台 / 机构管理")}
                ${auditRow("09:12:03","broker_admin 上传 holdings_20260115.xlsx，校验通过。","券商端 / 持仓上传")}
              </div>
            </div>
          </div>
        `;
      }
    };

    function renderRole(role, firstPage) {
      currentRole = role;
      const cfg = roleMenus[role];
      navTitle.textContent = cfg.title;
      avatar.textContent = cfg.avatar;
      navEl.innerHTML = cfg.menus.map((m, idx) => `
        <div class="nav-item ${idx === 0 ? "active" : ""}" data-page="${m[0]}" data-title="${m[2]}" data-desc="${m[3]}">
          <span>${m[1]}</span> ${m[2]}
        </div>
      `).join("");

      document.querySelectorAll(".role-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.role === role);
      });

      bindNav();
      const p = firstPage || cfg.menus[0][0];
      renderPage(p);
    }

    function bindNav() {
      document.querySelectorAll(".nav-item").forEach(item => {
        item.addEventListener("click", () => {
          document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
          item.classList.add("active");
          renderPage(item.dataset.page);
        });
      });
    }

    function renderPage(page) {
      currentPage = page;
      const menu = roleMenus[currentRole].menus.find(m => m[0] === page);
      pageTitle.textContent = menu[2];
      pageDesc.textContent = menu[3];
      content.innerHTML = renderers[page] ? renderers[page]() : "<div class='card'><div class='card-body'>页面待配置</div></div>";
    }

    document.querySelectorAll(".role-btn").forEach(btn => {
      btn.addEventListener("click", () => renderRole(btn.dataset.role));
    });

    function metrics(items) {
      return `
        <div class="grid grid-4">
          ${items.map(([label,value,note,type]) => `
            <div class="card metric">
              <div class="metric-label">${label}</div>
              <div class="metric-value">${value}</div>
              <div class="metric-note note-${type || "blue"}">${note}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function tableCard(title, sub, heads, rows) {
      return `
        <div class="card" style="margin-top:18px;">
          <div class="card-head">
            <div>
              <div class="card-title">${title}</div>
              <div class="card-sub">${sub}</div>
            </div>
            <span class="tag tag-blue">实时数据</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr>${heads.map(h => `<th>${h}</th>`).join("")}</tr></thead>
              <tbody>
                ${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function stock(name, code) {
      return `
        <div class="stock">
          <div class="stock-logo">${name.slice(0,1)}</div>
          <div>
            <div class="stock-name">${name}</div>
            <div class="stock-code">${code}</div>
          </div>
        </div>
      `;
    }

    function tag(text, type) {
      return `<span class="tag tag-${type}">${text}</span>`;
    }

    function progress(width) {
      return `<div class="progress"><i style="width:${width};"></i></div>`;
    }

    function btns(text) {
      return `<button class="btn btn-soft" onclick="toast('${text} 操作已模拟执行')">${text}</button>`;
    }

    function actionBtns(a,b) {
      return `
        <button class="btn btn-soft" onclick="toast('已锁定券源，有效期30分钟')">${a}</button>
        <button class="btn btn-outline" onclick="openModal()">${b}</button>
      `;
    }

    function step(n,t,d) {
      return `
        <div class="step">
          <div class="step-num">${n}</div>
          <div>
            <div class="step-title">${t}</div>
            <div class="step-desc">${d}</div>
          </div>
        </div>
      `;
    }

    function formRow(label, inner) {
      return `<div class="form-row"><label>${label}</label>${inner}</div>`;
    }

    function commonToolbar(ph, s1, s2, btn) {
      return `
        <div class="toolbar">
          <div class="filters">
            <input class="field" placeholder="${ph}" />
            <select class="select"><option>${s1}</option></select>
            <select class="select"><option>${s2}</option></select>
            <select class="select"><option>全部状态</option><option>已发布</option><option>部分借出</option></select>
          </div>
          <div>
            <button class="btn btn-outline" onclick="toast('已导出当前列表')">导出</button>
            <button class="btn btn-primary" onclick="openModal()">+ ${btn}</button>
          </div>
        </div>
      `;
    }

    function kanbanCol(title, count, type, cards) {
      return `
        <div class="kanban-col">
          <div class="kanban-title">${title} ${tag(count,type)}</div>
          ${cards.join("")}
        </div>
      `;
    }

    function deal(id,name,status,type,meta) {
      return `
        <div class="deal-card">
          <div style="display:flex;justify-content:space-between;gap:10px;">
            <div>
              <div class="deal-id">${id}</div>
              <div class="deal-name">${name}</div>
            </div>
            ${tag(status,type)}
          </div>
          <div class="deal-meta">
            ${[0,2,4,6].map(i => `<div>${meta[i]}<strong>${meta[i+1]}</strong></div>`).join("")}
          </div>
        </div>
      `;
    }

    function tl(n,t,d) {
      return `
        <div class="timeline-item">
          <div class="timeline-dot">${n}</div>
          <div>
            <div class="tl-title">${t}</div>
            <div class="tl-desc">${d}</div>
          </div>
        </div>
      `;
    }

    function rule(t,d,status) {
      return `
        <div class="rule-card">
          <div>
            <div class="step-title">${t}</div>
            <div class="step-desc">${d}</div>
            <div style="margin-top:10px;">${tag(status,"green")}</div>
          </div>
          <div class="switch"></div>
        </div>
      `;
    }

    function auditRow(time, action, module) {
      return `
        <div class="audit-row">
          <div><strong>${time}</strong><div class="card-sub">2026-01-15</div></div>
          <div>${action}</div>
          <div>${tag(module,"blue")}</div>
        </div>
      `;
    }

    function openModal() {
      modalMask.classList.add("show");
    }

    function closeModal() {
      modalMask.classList.remove("show");
    }

    modalMask.addEventListener("click", e => {
      if (e.target === modalMask) closeModal();
    });

    function toast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 2600);
    }

    renderRole("broker", "upload");
  </script>
</body>
</html>
